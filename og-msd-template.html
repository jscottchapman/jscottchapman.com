<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; }
    body {
      background: #F1ECE0;
      color: #1F1B14;
      font-family: 'IBM Plex Sans', sans-serif;
      padding: 64px 80px 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-bottom: 16px solid #B5532A;
      overflow: hidden;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 17px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3B362A;
      border-bottom: 3px double #1F1B14;
      padding-bottom: 18px;
    }
    .top .skill { font-weight: 600; color: #1F1B14; }
    .mid { padding: 4px 0 0; }
    h1 {
      font-family: 'Newsreader', serif;
      font-weight: 500;
      font-size: 92px;
      line-height: 0.98;
      letter-spacing: -0.02em;
      max-width: 17ch;
    }
    h1 em { font-style: italic; color: #B5532A; }
    .deck {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-size: 30px;
      line-height: 1.4;
      color: #3B362A;
      max-width: 30ch;
      margin-top: 26px;
    }
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6A6356;
      padding-bottom: 40px;
    }
    .bottom .site { color: #B5532A; font-weight: 600; }
  </style>
</head>
<body>
  <div class="top">
    <span class="skill">Magical Service Design</span>
    <span>A free Claude skill</span>
  </div>
  <div class="mid">
    <h1>Brainstorming, but it refuses to be <em>boring</em>.</h1>
    <p class="deck">Describe a customer moment. Get back ideas ranked by how audacious they are.</p>
  </div>
  <div class="bottom">
    <span class="site">jscottchapman.com / skills</span>
    <span>J Scott Chapman</span>
  </div>
</body>
</html>
